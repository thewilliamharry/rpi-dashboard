<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beacon</title>
  <link rel="icon" id="favicon" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" id="apple-favicon" sizes="180x180">
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="hud-c tl"></div>
<div class="hud-c tr"></div>
<div class="hud-c bl"></div>
<div class="hud-c br"></div>

<div class="topbar">
  <div class="tb-left">
    <span class="tb-host" id="tb-host">loading...</span>
    <div class="tb-sep"></div>
    <div class="tb-meta">
      <div class="scan-status">
        <div class="scan-pip" id="scan-pip"></div>
        <span id="scan-label">pending scan</span>
      </div>
    </div>
  </div>
  <div class="tb-right">
    <button class="btn-scan">&#8635; scan now</button>
    <div class="tb-sep"></div>
    <button class="theme-toggle" id="toggle"><div class="toggle-pip"></div></button>
  </div>
</div>

<div class="page">
  <div>
    <div class="sh">
      <span class="sh-label">System</span>
      <div class="sh-line"></div>
      <span class="sh-r" id="stats-ts">—</span>
    </div>

    <div class="metrics-row">
      <div class="metric-panel cpu">
        <div class="arc-wrap">
          <svg viewBox="0 0 84 84">
            <circle class="arc-track" cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="53"/>
            <circle class="arc-fill"  cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="213.6" id="cpu-arc"/>
          </svg>
          <div class="arc-center">
            <span class="arc-pct" id="cpu-pct">—</span>
            <span class="arc-unit">%</span>
          </div>
        </div>
        <div class="metric-right">
          <span class="metric-name">CPU</span>
          <span class="metric-sub" id="cpu-sub">—</span>
          <div class="sparkline">
            <svg viewBox="0 0 200 40" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gc" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#00d4ff"/>
                  <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path class="sp-fill" id="cpu-sparkfill" fill="url(#gc)" d=""/>
              <path class="sp-line" id="cpu-sparkline" stroke="#00d4ff" d=""/>
            </svg>
          </div>
        </div>
      </div>

      <div class="metric-panel ram">
        <div class="arc-wrap">
          <svg viewBox="0 0 84 84">
            <circle class="arc-track" cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="53"/>
            <circle class="arc-fill"  cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="213.6" id="ram-arc"/>
          </svg>
          <div class="arc-center">
            <span class="arc-pct" id="ram-pct">—</span>
            <span class="arc-unit">%</span>
          </div>
        </div>
        <div class="metric-right">
          <span class="metric-name">RAM</span>
          <span class="metric-sub" id="ram-sub">—</span>
          <div class="sparkline">
            <svg viewBox="0 0 200 40" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#ffab00"/>
                  <stop offset="100%" stop-color="#ffab00" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path class="sp-fill" id="ram-sparkfill" fill="url(#gr)" d=""/>
              <path class="sp-line" id="ram-sparkline" stroke="#ffab00" d=""/>
            </svg>
          </div>
        </div>
      </div>

      <div class="metric-panel disk">
        <div class="arc-wrap">
          <svg viewBox="0 0 84 84">
            <circle class="arc-track" cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="53"/>
            <circle class="arc-fill"  cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="213.6" id="disk-arc"/>
          </svg>
          <div class="arc-center">
            <span class="arc-pct" id="disk-pct">—</span>
            <span class="arc-unit">%</span>
          </div>
        </div>
        <div class="metric-right">
          <span class="metric-name">Disk</span>
          <span class="metric-sub" id="disk-sub">—</span>
          <div class="sparkline">
            <svg viewBox="0 0 200 40" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#7b6fff"/>
                  <stop offset="100%" stop-color="#7b6fff" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path class="sp-fill" id="disk-sparkfill" fill="url(#gd)" d=""/>
              <path class="sp-line" id="disk-sparkline" stroke="#7b6fff" d=""/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="temp-row">
      <span>CPU TEMP</span>
      <span class="temp-val" id="temp-val">—</span>
      <span style="margin-left:auto;opacity:0.5" id="temp-ts">—</span>
    </div>
  </div>

  <div>
    <div class="sh">
      <span class="sh-label">Services</span>
      <div class="sh-line"></div>
      <span class="sh-r" id="svc-count-label">—</span>
    </div>
    <div class="services-grid" id="services-grid">
      <div class="svc-empty">scanning for services...</div>
    </div>
  </div>

  <div>
    <div class="sh">
      <span class="sh-label">Events</span>
      <div class="sh-line"></div>
      <span class="sh-r" id="events-label">—</span>
    </div>
    <div class="events-panel" id="events-panel">
      <div class="evt-empty">no recent incidents</div>
    </div>
  </div>
</div>

<div class="meta-modal-backdrop" id="meta-modal" hidden>
  <div class="meta-modal-window" role="dialog" aria-modal="true" aria-labelledby="meta-modal-title">
    <div class="meta-modal-head">
      <h2 id="meta-modal-title">Edit Service</h2>
      <span class="meta-modal-port" id="meta-modal-port">:—</span>
    </div>

    <form id="meta-form" class="meta-form">
      <label class="meta-field">
        <span class="meta-label">Display name</span>
        <input type="text" id="meta-display-name" autocomplete="off" />
      </label>

      <label class="meta-field">
        <span class="meta-label">Path</span>
        <input type="text" id="meta-path" placeholder="/" autocomplete="off" />
        <span class="meta-help">Used for checks, previews, and link target.</span>
      </label>

      <label class="meta-field meta-checkbox">
        <input type="checkbox" id="meta-critical" />
        <span>Critical service</span>
      </label>

      <label class="meta-field">
        <span class="meta-label">Tags</span>
        <input type="text" id="meta-tags" placeholder="core, prod" autocomplete="off" />
      </label>

      <details class="meta-advanced" id="meta-advanced">
        <summary>Advanced</summary>
        <label class="meta-field">
          <span class="meta-label">Base URL override</span>
          <input type="text" id="meta-url" placeholder="http://host:port" autocomplete="off" />
          <span class="meta-help">Host/protocol used for checks and preview refresh.</span>
        </label>
      </details>

      <div class="meta-error" id="meta-error" hidden></div>

      <div class="meta-actions">
        <button type="button" class="meta-btn meta-btn-ghost" id="meta-cancel">Cancel</button>
        <button type="submit" class="meta-btn meta-btn-primary" id="meta-save">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
const APP_NAME = 'Beacon';
const EVENT_TYPES_VISIBLE = new Set(['state_change', 'alert_failed', 'meta_updated']);
let _titleHost = '';
let _fvCpu = 0;
let _fvOnline = null;
let _fvTotal = null;
let _lastStatsTs = null;
let _servicesByPort = new Map();
let _metaModalSvc = null;
let _metaModalSaving = false;

function capFirst(text) {
  const v = (text || '').trim();
  if (!v) return '';
  return v[0].toUpperCase() + v.slice(1);
}

function pageTitleBase() {
  const host = capFirst(_titleHost);
  return host ? `${host} ${APP_NAME}` : APP_NAME;
}

function fmtAgo(ts) {
  const d = Math.floor(Date.now() / 1000) - ts;
  if (d < 5) return 'just now';
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d / 60) + 'm ago';
  if (d < 86400) return Math.floor(d / 3600) + 'h ago';
  return Math.floor(d / 86400) + 'd ago';
}

function fmtBytes(b) {
  if (b >= 1e12) return (b / 1e12).toFixed(1) + ' TB';
  if (b >= 1e9) return (b / 1e9).toFixed(1) + ' GB';
  return Math.round(b / 1e6) + ' MB';
}

function fmtLatency(ms) {
  if (ms === null || ms === undefined) return 'n/a';
  return Math.round(ms) + ' ms';
}

function arcOffset(pct) {
  return 53 + 160.6 * (1 - pct / 100);
}

function _makeBulbCanvas(size, color, solidBg) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2;
  const cy = size / 2;
  const bulbR = size * 0.34;

  if (solidBg) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
  }

  ctx.beginPath();
  ctx.arc(cx, cy, bulbR + size * 0.09, 0, Math.PI * 2);
  ctx.fillStyle = color + '33';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, bulbR, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx - bulbR * 0.28, cy - bulbR * 0.30, bulbR * 0.30, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.fill();

  return canvas;
}

function drawFavicon() {
  const someDown = _fvTotal !== null && _fvOnline !== null && _fvOnline < _fvTotal;
  const allDown = _fvTotal > 0 && _fvOnline === 0;
  let color;

  if (_fvCpu > 90 || allDown) {
    color = '#dc2626';
  } else if (someDown || _fvCpu > 80) {
    color = '#f59e0b';
  } else {
    color = '#22c55e';
  }

  document.getElementById('favicon').href = _makeBulbCanvas(32, color, false).toDataURL('image/png');
  document.getElementById('apple-favicon').href = _makeBulbCanvas(180, color, true).toDataURL('image/png');

  const offline = (_fvTotal !== null && _fvOnline !== null) ? (_fvTotal - _fvOnline) : 0;
  const baseTitle = pageTitleBase();
  document.title = offline > 0 ? `${baseTitle} - ${offline} offline` : baseTitle;
}

function buildSparkPath(rows, key) {
  if (!rows || rows.length === 0) return { line: '', fill: '' };
  let data = rows;
  if (data.length > 200) {
    const step = Math.ceil(data.length / 200);
    data = data.filter((_, i) => i % step === 0);
  }
  const vals = data.map(r => r[key]);
  const W = 200, H = 40, pad = 2;
  const pts = vals.map((v, i) => [
    (i / Math.max(vals.length - 1, 1)) * W,
    pad + (1 - Math.min(Math.max(v, 0), 100) / 100) * (H - 2 * pad)
  ]);
  const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const fill = line + ' L' + W + ',' + H + ' L0,' + H + 'Z';
  return { line, fill };
}

function downsampleBuckets(buckets) {
  if (!Array.isArray(buckets)) return [];
  const dpr = window.devicePixelRatio || 1;
  if (dpr >= 1.5) return buckets;
  const reduced = [];
  for (let i = 0; i < buckets.length; i += 2) {
    const a = buckets[i];
    const b = buckets[i + 1];
    if (a === 0 || b === 0) {
      reduced.push(0);
    } else if (a === 1 || b === 1) {
      reduced.push(1);
    } else {
      reduced.push(-1);
    }
  }
  return reduced;
}

function buildUptimeStrip(buckets) {
  const src = downsampleBuckets(Array.isArray(buckets) ? buckets : []);
  const states = src.length > 0 ? src : Array(168).fill(-1);

  const strip = document.createElement('div');
  strip.className = 'uptime-strip';
  strip.dataset.density = states.length < 120 ? 'low' : 'high';

  states.forEach(v => {
    const seg = document.createElement('div');
    seg.className = 'us ' + (v === 0 ? 'down' : (v === 1 ? 'up' : 'unknown'));
    strip.appendChild(seg);
  });

  const labels = document.createElement('div');
  labels.className = 'uptime-labels';
  labels.innerHTML = '<span>7d ago</span><span>now</span>';

  const wrapper = document.createElement('div');
  wrapper.appendChild(strip);
  wrapper.appendChild(labels);
  return wrapper;
}

function setGaugeWeight(isLight) {
  document.querySelectorAll('.arc-track, .arc-fill').forEach(el =>
    el.setAttribute('stroke-width', isLight ? '1.5' : '5')
  );
}

function doTransition(toLight) {
  const toggle = document.getElementById('toggle');
  const rect = toggle.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const maxR = Math.hypot(
    Math.max(cx, window.innerWidth - cx),
    Math.max(cy, window.innerHeight - cy)
  );

  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;pointer-events:all;
    background:${toLight ? '#ffffff' : '#010a14'};
    clip-path:circle(0px at ${cx}px ${cy}px);
    transition:clip-path 520ms cubic-bezier(0.76,0,0.24,1);
  `;
  document.body.appendChild(overlay);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    overlay.style.clipPath = `circle(${maxR + 20}px at ${cx}px ${cy}px)`;
  }));

  setTimeout(() => {
    document.documentElement.classList.toggle('light', toLight);
    setGaugeWeight(toLight);
  }, 440);

  setTimeout(() => {
    overlay.style.transition = 'opacity 180ms ease';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 180);
  }, 460);
}

function applyTheme(isLight, animate) {
  if (animate) {
    doTransition(isLight);
    return;
  }
  document.documentElement.classList.toggle('light', isLight);
  setGaugeWeight(isLight);
}

function updateStats(d) {
  _lastStatsTs = Math.floor(Date.now() / 1000);
  _fvCpu = d.cpu;
  const hostname = (d.hostname || 'pi').trim();
  _titleHost = hostname;
  document.getElementById('tb-host').textContent = hostname;
  drawFavicon();

  document.getElementById('cpu-arc').setAttribute('stroke-dashoffset', arcOffset(d.cpu).toFixed(1));
  document.getElementById('cpu-pct').textContent = Math.round(d.cpu);
  document.getElementById('cpu-sub').textContent = Math.round(d.cpu) + '%';

  document.getElementById('ram-arc').setAttribute('stroke-dashoffset', arcOffset(d.ram).toFixed(1));
  document.getElementById('ram-pct').textContent = Math.round(d.ram);
  document.getElementById('ram-sub').textContent = fmtBytes(d.ram_used) + ' / ' + fmtBytes(d.ram_total);

  document.getElementById('disk-arc').setAttribute('stroke-dashoffset', arcOffset(d.disk).toFixed(1));
  document.getElementById('disk-pct').textContent = Math.round(d.disk);
  document.getElementById('disk-sub').textContent = fmtBytes(d.disk_used) + ' / ' + fmtBytes(d.disk_total);

  if (d.temp !== null && d.temp !== undefined) {
    document.getElementById('temp-val').textContent = d.temp.toFixed(1) + ' C';
  } else {
    document.getElementById('temp-val').textContent = 'n/a';
  }

  document.getElementById('temp-ts').textContent = 'just now';
  document.getElementById('stats-ts').textContent = 'updated just now';
}

function tickStatsLabel() {
  if (_lastStatsTs) {
    document.getElementById('stats-ts').textContent = 'updated ' + fmtAgo(_lastStatsTs);
    document.getElementById('temp-ts').textContent = fmtAgo(_lastStatsTs);
  }
}

function updateHistory(rows) {
  const cpu = buildSparkPath(rows, 'cpu');
  const ram = buildSparkPath(rows, 'ram');
  const disk = buildSparkPath(rows, 'disk');

  document.getElementById('cpu-sparkfill').setAttribute('d', cpu.fill);
  document.getElementById('cpu-sparkline').setAttribute('d', cpu.line);
  document.getElementById('ram-sparkfill').setAttribute('d', ram.fill);
  document.getElementById('ram-sparkline').setAttribute('d', ram.line);
  document.getElementById('disk-sparkfill').setAttribute('d', disk.fill);
  document.getElementById('disk-sparkline').setAttribute('d', disk.line);
}

function updateScanStatus(d) {
  const pip = document.getElementById('scan-pip');
  const label = document.getElementById('scan-label');
  pip.className = 'scan-pip';

  if (d.scanning) {
    pip.classList.add('scanning');
    label.textContent = 'scanning ports...';
  } else if (d.last_discovery) {
    pip.classList.add('ready');
    label.textContent = 'scanned ' + fmtAgo(d.last_discovery);
  } else {
    label.textContent = 'pending scan';
  }
}

function loadThumbnail(port, imgEl, fallbackDiv) {
  imgEl.onload = () => {
    imgEl.style.display = '';
    fallbackDiv.style.display = 'none';
  };
  imgEl.onerror = () => {
    imgEl.style.display = 'none';
    fallbackDiv.style.display = 'flex';
  };
  imgEl.src = '/api/thumbnail/' + port;
}

function isLoopbackHost(hostname) {
  return hostname === '127.0.0.1' || hostname === 'localhost' || hostname === '::1';
}

function normalizePathForUi(value) {
  const raw = (value || '').trim();
  if (!raw) return '/';
  if (raw.startsWith('?') || raw.startsWith('#')) {
    return '/' + raw;
  }
  if (raw.startsWith('/')) return raw;
  return '/' + raw;
}

function editorBaseUrl(svc) {
  try {
    const parsed = new URL((svc && svc.url) || '', window.location.href);
    const port = parsed.port || String((svc && svc.port) || '');
    if (isLoopbackHost(parsed.hostname) && window.location.hostname && !isLoopbackHost(window.location.hostname)) {
      return parsed.protocol + '//' + window.location.hostname + (port ? (':' + port) : '');
    }
    return parsed.protocol + '//' + parsed.host;
  } catch (e) {
    return 'http://' + window.location.hostname + ':' + svc.port;
  }
}

function buildServiceHref(svc) {
  const fallbackPath = normalizePathForUi(svc && svc.path);
  const fallback = '//' + window.location.hostname + ':' + svc.port + fallbackPath;
  if (!svc || !svc.url) return fallback;

  try {
    const parsed = new URL(svc.url, window.location.href);
    if (!isLoopbackHost(parsed.hostname)) {
      return parsed.href;
    }

    const targetPort = parsed.port || String(svc.port);
    const suffix = (parsed.pathname || '/') + (parsed.search || '') + (parsed.hash || '');
    return '//' + window.location.hostname + ':' + targetPort + suffix;
  } catch (e) {
    return fallback;
  }
}

function setMetaFormMessage(message, kind) {
  const el = document.getElementById('meta-error');
  if (!message) {
    el.hidden = true;
    el.textContent = '';
    el.classList.remove('meta-warning');
    return;
  }
  el.classList.toggle('meta-warning', kind === 'warning');
  el.hidden = false;
  el.textContent = message;
}

function setMetaFormSaving(saving) {
  _metaModalSaving = !!saving;
  const form = document.getElementById('meta-form');
  const save = document.getElementById('meta-save');
  const cancel = document.getElementById('meta-cancel');
  form.querySelectorAll('input').forEach((input) => {
    input.disabled = _metaModalSaving;
  });
  save.disabled = _metaModalSaving;
  cancel.disabled = _metaModalSaving;
  save.textContent = _metaModalSaving ? 'Saving...' : 'Save';
}

function closeMetaEditor() {
  if (_metaModalSaving) return;
  const modal = document.getElementById('meta-modal');
  modal.hidden = true;
  document.body.classList.remove('modal-open');
  _metaModalSvc = null;
  setMetaFormMessage('');
}

async function openMetaEditor(svc, evt) {
  evt.preventDefault();
  evt.stopPropagation();
  _metaModalSvc = svc;
  document.getElementById('meta-modal-port').textContent = ':' + svc.port;
  document.getElementById('meta-display-name').value = svc.display_name || '';
  document.getElementById('meta-path').value = normalizePathForUi(svc.path || '/');
  document.getElementById('meta-critical').checked = !!svc.critical;
  document.getElementById('meta-tags').value = Array.isArray(svc.tags) ? svc.tags.join(', ') : '';
  document.getElementById('meta-url').value = editorBaseUrl(svc);
  document.getElementById('meta-advanced').open = false;
  setMetaFormMessage('');
  setMetaFormSaving(false);
  document.getElementById('meta-modal').hidden = false;
  document.body.classList.add('modal-open');
  document.getElementById('meta-display-name').focus();
  document.getElementById('meta-display-name').select();
}

async function submitMetaEditor(evt) {
  evt.preventDefault();
  if (!_metaModalSvc || _metaModalSaving) return;

  const displayName = document.getElementById('meta-display-name').value.trim();
  const pathRaw = document.getElementById('meta-path').value.trim();
  const critical = document.getElementById('meta-critical').checked;
  const tags = document.getElementById('meta-tags').value.trim();
  const urlRaw = document.getElementById('meta-url').value.trim();

  const payload = {
    display_name: displayName,
    path: pathRaw,
    critical,
    tags,
  };
  if (urlRaw !== '') {
    payload.url = urlRaw;
  }

  setMetaFormSaving(true);
  setMetaFormMessage('');
  try {
    const r = await fetch('/api/service-meta/' + _metaModalSvc.port, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!r.ok) {
      let msg = 'Failed to save metadata';
      try {
        const data = await r.json();
        if (data && data.error) msg = data.error;
      } catch (e) {}
      setMetaFormMessage(msg, 'error');
      setMetaFormSaving(false);
      return;
    }

    let data = {};
    try {
      data = await r.json();
    } catch (e) {}

    setMetaFormSaving(false);
    if (data && data.refresh_warning) {
      setMetaFormMessage('Saved. ' + data.refresh_warning, 'warning');
      await fetchServices();
      await fetchEvents();
      return;
    }

    closeMetaEditor();
    await fetchServices();
    await fetchEvents();
  } catch (e) {
    setMetaFormMessage('Metadata update failed', 'error');
    setMetaFormSaving(false);
  }
}

function buildCard(svc) {
  const port = svc.port;
  const online = !!svc.is_online;
  const href = buildServiceHref(svc);

  const card = document.createElement('a');
  card.className = 'svc-card' + (online ? '' : ' offline');
  card.href = href;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.dataset.port = port;

  ['tl', 'tr', 'bl', 'br'].forEach(c => {
    const d = document.createElement('div');
    d.className = 'corner corner-' + c;
    card.appendChild(d);
  });

  const badge = document.createElement('div');
  badge.className = 'offline-badge';
  badge.textContent = 'OFFLINE';
  if (online) badge.style.display = 'none';
  card.appendChild(badge);

  const preview = document.createElement('div');
  preview.className = 'svc-preview';

  const thumb = document.createElement('img');
  thumb.className = 'svc-thumb';
  thumb.style.display = 'none';
  thumb.alt = '';

  const fallback = document.createElement('div');
  fallback.className = 'svc-preview-fallback';
  fallback.innerHTML = '<span class="fallback-port">:' + port + '</span><span>no preview</span>';

  const fade = document.createElement('div');
  fade.className = 'preview-fade';

  preview.appendChild(thumb);
  preview.appendChild(fallback);
  preview.appendChild(fade);
  card.appendChild(preview);

  if (svc.has_thumb) loadThumbnail(port, thumb, fallback);

  const meta = document.createElement('div');
  meta.className = 'svc-meta';

  const titleRow = document.createElement('div');
  titleRow.className = 'svc-title-row';

  const titleEl = document.createElement('span');
  titleEl.className = 'svc-title';
  titleEl.textContent = svc.display_name || svc.title || (':' + port);

  const right = document.createElement('div');
  right.className = 'svc-title-right';

  if (svc.critical) {
    const critical = document.createElement('span');
    critical.className = 'svc-critical';
    critical.textContent = 'critical';
    right.appendChild(critical);
  }

  const badgeEl = document.createElement('span');
  badgeEl.className = 'svc-port-badge';
  badgeEl.textContent = ':' + port;
  right.appendChild(badgeEl);

  const edit = document.createElement('button');
  edit.className = 'svc-edit';
  edit.textContent = 'edit';
  edit.addEventListener('click', (evt) => openMetaEditor(svc, evt));
  right.appendChild(edit);

  titleRow.appendChild(titleEl);
  titleRow.appendChild(right);

  const statusRow = document.createElement('div');
  statusRow.className = 'svc-status-row';

  const statusLeft = document.createElement('div');
  statusLeft.style.cssText = 'display:flex;align-items:center;gap:5px;';
  const statusEl = document.createElement('div');
  statusEl.className = online ? 'svc-online' : 'svc-offline';
  const pip = document.createElement('span');
  pip.className = 'status-pip';
  const statusLabel = document.createElement('span');
  statusLabel.textContent = online ? 'online' : 'offline';
  statusEl.appendChild(pip);
  statusEl.appendChild(statusLabel);
  statusLeft.appendChild(statusEl);

  const statusRight = document.createElement('div');
  statusRight.style.cssText = 'display:flex;align-items:center;gap:4px;';
  const sinceEl = document.createElement('span');
  sinceEl.className = 'svc-since';
  sinceEl.textContent = online ? ('since ' + fmtAgo(svc.first_seen)) : ('last seen ' + fmtAgo(svc.last_seen));

  const pctEl = document.createElement('span');
  pctEl.className = 'svc-uptime-pct';
  pctEl.textContent = svc.uptime_pct !== null && svc.uptime_pct !== undefined ? ('- ' + svc.uptime_pct + '%') : '';

  statusRight.appendChild(sinceEl);
  statusRight.appendChild(pctEl);
  statusRow.appendChild(statusLeft);
  statusRow.appendChild(statusRight);

  const detailRow = document.createElement('div');
  detailRow.className = 'svc-detail-row';

  const latencyEl = document.createElement('span');
  latencyEl.className = 'svc-latency';
  latencyEl.textContent = 'latency ' + fmtLatency(svc.latency_ms);

  const errorEl = document.createElement('span');
  errorEl.className = 'svc-error';
  errorEl.textContent = svc.last_error ? ('error ' + svc.last_error) : '';

  detailRow.appendChild(latencyEl);
  detailRow.appendChild(errorEl);

  const tagRow = document.createElement('div');
  tagRow.className = 'svc-tags';
  const tags = Array.isArray(svc.tags) ? svc.tags : [];
  if (tags.length > 0) {
    tagRow.textContent = tags.map(t => '#' + t).join(' ');
  }

  meta.appendChild(titleRow);
  meta.appendChild(statusRow);
  meta.appendChild(detailRow);
  if (tags.length > 0) meta.appendChild(tagRow);
  meta.appendChild(buildUptimeStrip(svc.uptime_buckets || []));
  card.appendChild(meta);

  return card;
}

function updateServices(services) {
  if (!Array.isArray(services)) return;

  _servicesByPort = new Map(services.map(s => [s.port, s]));

  const grid = document.getElementById('services-grid');
  grid.innerHTML = '';

  if (services.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'svc-empty';
    empty.textContent = 'no services found yet';
    grid.appendChild(empty);
  } else {
    const ordered = [...services].sort((a, b) => {
      const ao = (a.pinned_order === null || a.pinned_order === undefined) ? a.port : a.pinned_order;
      const bo = (b.pinned_order === null || b.pinned_order === undefined) ? b.port : b.pinned_order;
      if (ao !== bo) return ao - bo;
      return a.port - b.port;
    });

    ordered.forEach(svc => {
      grid.appendChild(buildCard(svc));
    });
  }

  const online = services.filter(s => s.is_online).length;
  const criticalDown = services.filter(s => s.critical && !s.is_online).length;
  _fvOnline = online;
  _fvTotal = services.length;
  drawFavicon();

  let label = online + ' online - ' + services.length + ' discovered';
  if (criticalDown > 0) {
    label += ' - ' + criticalDown + ' critical down';
  }
  document.getElementById('svc-count-label').textContent = label;
}

function eventText(evt) {
  if (evt.event_type === 'state_change') {
    return evt.online ? 'Recovered' : 'Down';
  }
  if (evt.event_type === 'alert_failed') return 'Alert failed';
  if (evt.event_type === 'meta_updated') return 'Service updated';
  return 'Event';
}

function showEvent(evt) {
  return !!evt && EVENT_TYPES_VISIBLE.has(evt.event_type);
}

function humanizeErrorClass(value) {
  if (!value) return '';
  const known = {
    timeout: 'timeout',
    connection_error: 'connection failed',
    request_error: 'request failed',
    probe_error: 'probe error',
    invalid_url: 'invalid URL',
    invalid_host: 'invalid host',
    invalid_scheme: 'invalid URL scheme',
    redirect_offhost: 'redirect blocked',
    not_responding: 'not responding',
  };
  return known[value] || value.replaceAll('_', ' ');
}

function humanizeAlertStatus(value) {
  if (!value) return '';
  if (value.startsWith('http_')) return 'HTTP ' + value.slice(5);
  return value.replaceAll('_', ' ');
}

function eventSubtext(evt) {
  const parts = [];
  if (evt.service_name) {
    parts.push(evt.service_name);
  } else if (evt.port !== null && evt.port !== undefined) {
    parts.push(':' + evt.port);
  }

  if (evt.event_type === 'state_change') {
    if (evt.online && evt.latency_ms !== null && evt.latency_ms !== undefined) {
      parts.push(Math.round(evt.latency_ms) + ' ms');
    } else if (!evt.online && evt.error_class) {
      parts.push(humanizeErrorClass(evt.error_class));
    }
  } else if (evt.event_type === 'alert_failed') {
    if (evt.alert_status) parts.push(humanizeAlertStatus(evt.alert_status));
    if (evt.error_class) parts.push(humanizeErrorClass(evt.error_class));
    if (evt.details && evt.details !== 'webhook delivered') parts.push(evt.details);
  } else if (evt.event_type === 'meta_updated' && evt.details) {
    parts.push(evt.details);
  }

  return parts.join(' - ');
}

function renderEvents(events) {
  const panel = document.getElementById('events-panel');
  panel.innerHTML = '';
  const visibleEvents = Array.isArray(events) ? events.filter(showEvent) : [];

  if (visibleEvents.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'evt-empty';
    empty.textContent = 'no recent incidents';
    panel.appendChild(empty);
    document.getElementById('events-label').textContent = '0 shown';
    return;
  }

  const frag = document.createDocumentFragment();
  visibleEvents.forEach(evt => {
    const row = document.createElement('div');
    row.className = 'evt-row evt-' + evt.event_type;
    if (evt.event_type === 'state_change') {
      row.classList.add(evt.online ? 'evt-up' : 'evt-down');
    }

    const left = document.createElement('div');
    left.className = 'evt-left';

    const title = document.createElement('div');
    title.className = 'evt-title';
    title.textContent = eventText(evt);

    const sub = document.createElement('div');
    sub.className = 'evt-sub';
    sub.textContent = eventSubtext(evt) || 'system event';

    left.appendChild(title);
    left.appendChild(sub);

    const timeEl = document.createElement('div');
    timeEl.className = 'evt-time';
    timeEl.textContent = fmtAgo(evt.ts);

    row.appendChild(left);
    row.appendChild(timeEl);
    frag.appendChild(row);
  });

  panel.appendChild(frag);
  document.getElementById('events-label').textContent = visibleEvents.length + ' shown';
}

async function fetchStats() {
  try {
    const r = await fetch('/api/stats');
    if (r.ok) updateStats(await r.json());
  } catch (e) {}
}

async function fetchHistory() {
  try {
    const r = await fetch('/api/history');
    if (r.ok) updateHistory(await r.json());
  } catch (e) {}
}

async function fetchScanStatus() {
  try {
    const r = await fetch('/api/scan-status');
    if (r.ok) updateScanStatus(await r.json());
  } catch (e) {}
}

async function fetchServices() {
  try {
    const r = await fetch('/api/services');
    if (r.ok) updateServices(await r.json());
  } catch (e) {}
}

async function fetchEvents() {
  try {
    const r = await fetch('/api/events?limit=120');
    if (r.ok) renderEvents(await r.json());
  } catch (e) {}
}

async function triggerScan() {
  try {
    const r = await fetch('/api/trigger-scan', { method: 'POST' });
    if (r.status === 429) {
      let msg = 'Scan already running or rate limited';
      try {
        const data = await r.json();
        if (data.reason === 'rate_limited' && data.retry_after) {
          msg = 'Rate limited. Retry in ' + data.retry_after + 's';
        }
      } catch (e) {}
      alert(msg);
    }

    await fetchScanStatus();
    await fetchEvents();
  } catch (e) {}
}

(function init() {
  const mq = window.matchMedia('(prefers-color-scheme: light)');
  const stored = localStorage.getItem('theme');
  const isLight = stored ? stored === 'light' : mq.matches;
  applyTheme(isLight, false);

  mq.addEventListener('change', e => {
    if (!localStorage.getItem('theme')) applyTheme(e.matches, false);
  });

  document.getElementById('toggle').addEventListener('click', () => {
    const next = !document.documentElement.classList.contains('light');
    localStorage.setItem('theme', next ? 'light' : 'dark');
    doTransition(next);
  });

  document.querySelector('.btn-scan').addEventListener('click', triggerScan);
  document.getElementById('meta-form').addEventListener('submit', submitMetaEditor);
  document.getElementById('meta-cancel').addEventListener('click', closeMetaEditor);
  document.getElementById('meta-modal').addEventListener('click', (evt) => {
    if (evt.target.id === 'meta-modal') closeMetaEditor();
  });
  document.addEventListener('keydown', (evt) => {
    if (evt.key === 'Escape' && !document.getElementById('meta-modal').hidden) {
      closeMetaEditor();
    }
  });

  drawFavicon();

  fetchStats();
  fetchHistory();
  fetchScanStatus();
  fetchServices();
  fetchEvents();

  setInterval(fetchStats, 5000);
  setInterval(fetchHistory, 30000);
  setInterval(fetchScanStatus, 4000);
  setInterval(fetchServices, 20000);
  setInterval(fetchEvents, 15000);
  setInterval(tickStatsLabel, 1000);
})();
</script>
