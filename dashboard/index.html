<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beacon</title>
  <link rel="icon" id="favicon" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" id="apple-favicon" sizes="180x180">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="hud-c tl"></div>
<div class="hud-c tr"></div>
<div class="hud-c bl"></div>
<div class="hud-c br"></div>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-left">
    <span class="tb-host" id="tb-host">loading...</span>
    <div class="tb-sep"></div>
    <div class="tb-meta">
      <div class="scan-status">
        <div class="scan-pip" id="scan-pip"></div>
        <span id="scan-label">pending scan</span>
      </div>
    </div>
  </div>
  <div class="tb-right">
    <button class="btn-scan">&#8635; scan now</button>
    <div class="tb-sep"></div>
    <button class="theme-toggle" id="toggle"><div class="toggle-pip"></div></button>
  </div>
</div>

<div class="page">

  <!-- System -->
  <div>
    <div class="sh">
      <span class="sh-label">System</span>
      <div class="sh-line"></div>
      <span class="sh-r" id="stats-ts">—</span>
    </div>

    <div class="metrics-row">

      <!-- CPU -->
      <div class="metric-panel cpu">
        <div class="arc-wrap">
          <svg viewBox="0 0 84 84">
            <circle class="arc-track" cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="53"/>
            <circle class="arc-fill"  cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="213.6" id="cpu-arc"/>
          </svg>
          <div class="arc-center">
            <span class="arc-pct" id="cpu-pct">—</span>
            <span class="arc-unit">%</span>
          </div>
        </div>
        <div class="metric-right">
          <span class="metric-name">CPU</span>
          <span class="metric-sub" id="cpu-sub">—</span>
          <div class="sparkline">
            <svg viewBox="0 0 200 40" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gc" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#00d4ff"/>
                  <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path class="sp-fill" id="cpu-sparkfill" fill="url(#gc)" d=""/>
              <path class="sp-line" id="cpu-sparkline" stroke="#00d4ff" d=""/>
            </svg>
          </div>
        </div>
      </div>

      <!-- RAM -->
      <div class="metric-panel ram">
        <div class="arc-wrap">
          <svg viewBox="0 0 84 84">
            <circle class="arc-track" cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="53"/>
            <circle class="arc-fill"  cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="213.6" id="ram-arc"/>
          </svg>
          <div class="arc-center">
            <span class="arc-pct" id="ram-pct">—</span>
            <span class="arc-unit">%</span>
          </div>
        </div>
        <div class="metric-right">
          <span class="metric-name">RAM</span>
          <span class="metric-sub" id="ram-sub">—</span>
          <div class="sparkline">
            <svg viewBox="0 0 200 40" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#ffab00"/>
                  <stop offset="100%" stop-color="#ffab00" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path class="sp-fill" id="ram-sparkfill" fill="url(#gr)" d=""/>
              <path class="sp-line" id="ram-sparkline" stroke="#ffab00" d=""/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Disk -->
      <div class="metric-panel disk">
        <div class="arc-wrap">
          <svg viewBox="0 0 84 84">
            <circle class="arc-track" cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="53"/>
            <circle class="arc-fill"  cx="42" cy="42" r="34" stroke-dasharray="214" stroke-dashoffset="213.6" id="disk-arc"/>
          </svg>
          <div class="arc-center">
            <span class="arc-pct" id="disk-pct">—</span>
            <span class="arc-unit">%</span>
          </div>
        </div>
        <div class="metric-right">
          <span class="metric-name">Disk</span>
          <span class="metric-sub" id="disk-sub">—</span>
          <div class="sparkline">
            <svg viewBox="0 0 200 40" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#7b6fff"/>
                  <stop offset="100%" stop-color="#7b6fff" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path class="sp-fill" id="disk-sparkfill" fill="url(#gd)" d=""/>
              <path class="sp-line" id="disk-sparkline" stroke="#7b6fff" d=""/>
            </svg>
          </div>
        </div>
      </div>

    </div>

    <div class="temp-row">
      <span>CPU TEMP</span>
      <span class="temp-val" id="temp-val">—</span>
      <span style="margin-left:auto;opacity:0.5" id="temp-ts">—</span>
    </div>
  </div>

  <!-- Services -->
  <div>
    <div class="sh">
      <span class="sh-label">Services</span>
      <div class="sh-line"></div>
      <span class="sh-r" id="svc-count-label">—</span>
    </div>
    <div class="services-grid" id="services-grid">
      <div class="svc-empty">scanning for services...</div>
    </div>
  </div>

</div>

<script>
const APP_NAME = 'Beacon';
let _titleHost = '';

function capFirst(text) {
  const v = (text || '').trim();
  if (!v) return '';
  return v[0].toUpperCase() + v.slice(1);
}

function pageTitleBase() {
  const host = capFirst(_titleHost);
  return host ? `${host} ${APP_NAME}` : APP_NAME;
}

// ── Favicon status bulb ────────────────────────────────────────────────────────

// State updated independently by stats and services polls
let _fvCpu    = 0;
let _fvOnline = null;   // null until first services response
let _fvTotal  = null;

function _makeBulbCanvas(size, color, solidBg) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx    = canvas.getContext('2d');
  const cx     = size / 2, cy = size / 2;
  const bulbR  = size * 0.34;

  // Solid white background for Apple touch icon; transparent for browser tab
  if (solidBg) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
  }

  // Soft outer glow
  ctx.beginPath();
  ctx.arc(cx, cy, bulbR + size * 0.09, 0, Math.PI * 2);
  ctx.fillStyle = color + '33';   // 20 % opacity halo
  ctx.fill();

  // Main bulb
  ctx.beginPath();
  ctx.arc(cx, cy, bulbR, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // Glass catch-light — top-left highlight
  ctx.beginPath();
  ctx.arc(cx - bulbR * 0.28, cy - bulbR * 0.30, bulbR * 0.30, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.fill();

  return canvas;
}

function drawFavicon() {
  // Status colours — match the dashboard's light-mode palette
  const someDown = _fvTotal !== null && _fvOnline !== null && _fvOnline < _fvTotal;
  const allDown  = _fvTotal  >  0    && _fvOnline === 0;
  let color;
  if (_fvCpu > 90 || allDown) {
    color = '#dc2626';   // red — critical (darker, less neon)
  } else if (someDown || _fvCpu > 80) {
    color = '#f59e0b';   // amber — warning
  } else {
    color = '#22c55e';   // green — all good (rich, natural green)
  }

  // 32×32 for browser tab — transparent background so it floats cleanly
  document.getElementById('favicon').href =
    _makeBulbCanvas(32, color, false).toDataURL('image/png');

  // 180×180 for Apple touch icon — white background required by iOS
  document.getElementById('apple-favicon').href =
    _makeBulbCanvas(180, color, true).toDataURL('image/png');

  // Update page title — surface offline count when things go wrong
  const offline = (_fvTotal !== null && _fvOnline !== null) ? _fvTotal - _fvOnline : 0;
  const baseTitle = pageTitleBase();
  document.title = offline > 0 ? `${baseTitle} — ${offline} offline` : baseTitle;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function fmtAgo(ts) {
  const d = Math.floor(Date.now() / 1000) - ts;
  if (d < 5)     return 'just now';
  if (d < 60)    return d + 's ago';
  if (d < 3600)  return Math.floor(d / 60) + 'm ago';
  if (d < 86400) return Math.floor(d / 3600) + 'h ago';
  return Math.floor(d / 86400) + 'd ago';
}

function fmtBytes(b) {
  if (b >= 1e9) return (b / 1e9).toFixed(1) + ' GB';
  return Math.round(b / 1e6) + ' MB';
}

function arcOffset(pct) {
  return 53 + 160.6 * (1 - pct / 100);
}

function buildSparkPath(rows, key) {
  if (!rows || rows.length === 0) return { line: '', fill: '' };
  let data = rows;
  if (data.length > 200) {
    const step = Math.ceil(data.length / 200);
    data = data.filter((_, i) => i % step === 0);
  }
  const vals = data.map(r => r[key]);
  const W = 200, H = 40, pad = 2;
  // Absolute 0–100 scale so value position reflects actual level
  const pts = vals.map((v, i) => [
    (i / Math.max(vals.length - 1, 1)) * W,
    pad + (1 - Math.min(Math.max(v, 0), 100) / 100) * (H - 2 * pad)
  ]);
  const line = pts.map((p, i) =>
    (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)
  ).join(' ');
  const fill = line + ' L' + W + ',' + H + ' L0,' + H + 'Z';
  return { line, fill };
}

function getUptimeBucketConfig(dpr = window.devicePixelRatio || 1) {
  // Keep fine-grained 1h buckets on high-density screens.
  // Use 2h buckets on low-density displays to prevent segment pile-up.
  if (dpr >= 1.5) return { buckets: 168, bucketSeconds: 3600, density: 'high' };
  return { buckets: 84, bucketSeconds: 7200, density: 'low' };
}

function buildUptimeStrip(checks) {
  const cfg = getUptimeBucketConfig();
  const now = Math.floor(Date.now() / 1000);
  const BUCKETS  = cfg.buckets;
  const BUCKET_S = cfg.bucketSeconds;

  const buckets = Array(BUCKETS).fill('unknown');
  for (const c of checks) {
    const age = now - c.ts;
    if (age < 0 || age > BUCKETS * BUCKET_S) continue;
    const idx = BUCKETS - 1 - Math.floor(age / BUCKET_S);
    if (idx >= 0 && idx < BUCKETS) {
      // Pessimistic: one 'down' in a bucket marks the whole bucket red
      if (!c.online) {
        buckets[idx] = 'down';
      } else if (buckets[idx] === 'unknown') {
        buckets[idx] = 'up';
      }
    }
  }

  const strip = document.createElement('div');
  strip.className = 'uptime-strip';
  strip.dataset.density = cfg.density;
  buckets.forEach(state => {
    const seg = document.createElement('div');
    seg.className = 'us ' + state;
    strip.appendChild(seg);
  });

  const labels = document.createElement('div');
  labels.className = 'uptime-labels';
  labels.innerHTML = '<span>7d ago</span><span>now</span>';

  const wrapper = document.createElement('div');
  wrapper.appendChild(strip);
  wrapper.appendChild(labels);
  return wrapper;
}

function calcUptimePct(checks) {
  if (!checks || checks.length === 0) return null;
  const known = checks.filter(c => c.online !== undefined && c.online !== null);
  if (known.length === 0) return null;
  return Math.round(known.filter(c => c.online).length / known.length * 100);
}

// ── Gauge weight (JS sets attribute, CSS var is the primary driver) ───────────

function setGaugeWeight(isLight) {
  document.querySelectorAll('.arc-track, .arc-fill').forEach(el =>
    el.setAttribute('stroke-width', isLight ? '1.5' : '5')
  );
}

// ── Theme ──────────────────────────────────────────────────────────────────────

function doTransition(toLight) {
  const toggle = document.getElementById('toggle');
  const rect   = toggle.getBoundingClientRect();
  const cx     = rect.left + rect.width  / 2;
  const cy     = rect.top  + rect.height / 2;
  const maxR   = Math.hypot(
    Math.max(cx, window.innerWidth  - cx),
    Math.max(cy, window.innerHeight - cy)
  );

  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;pointer-events:all;
    background:${toLight ? '#ffffff' : '#010a14'};
    clip-path:circle(0px at ${cx}px ${cy}px);
    transition:clip-path 520ms cubic-bezier(0.76,0,0.24,1);
  `;
  document.body.appendChild(overlay);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    overlay.style.clipPath = `circle(${maxR + 20}px at ${cx}px ${cy}px)`;
  }));

  setTimeout(() => {
    document.documentElement.classList.toggle('light', toLight);
    setGaugeWeight(toLight);
  }, 440);

  setTimeout(() => {
    overlay.style.transition = 'opacity 180ms ease';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 180);
  }, 460);
}

function applyTheme(isLight, animate) {
  if (animate) { doTransition(isLight); return; }
  document.documentElement.classList.toggle('light', isLight);
  setGaugeWeight(isLight);
}

// ── Stats update ───────────────────────────────────────────────────────────────

let _lastStatsTs = null;

function updateStats(d) {
  _lastStatsTs = Math.floor(Date.now() / 1000);
  _fvCpu = d.cpu;
  const hostname = (d.hostname || 'pi').trim();
  _titleHost = hostname;
  document.getElementById('tb-host').textContent = hostname;
  drawFavicon();

  document.getElementById('cpu-arc').setAttribute('stroke-dashoffset', arcOffset(d.cpu).toFixed(1));
  document.getElementById('cpu-pct').textContent = Math.round(d.cpu);
  document.getElementById('cpu-sub').textContent = Math.round(d.cpu) + '%';

  document.getElementById('ram-arc').setAttribute('stroke-dashoffset', arcOffset(d.ram).toFixed(1));
  document.getElementById('ram-pct').textContent = Math.round(d.ram);
  document.getElementById('ram-sub').textContent = fmtBytes(d.ram_used) + ' / ' + fmtBytes(d.ram_total);

  document.getElementById('disk-arc').setAttribute('stroke-dashoffset', arcOffset(d.disk).toFixed(1));
  document.getElementById('disk-pct').textContent = Math.round(d.disk);
  document.getElementById('disk-sub').textContent = fmtBytes(d.disk_used) + ' / ' + fmtBytes(d.disk_total);

  if (d.temp !== null && d.temp !== undefined) {
    document.getElementById('temp-val').textContent = d.temp.toFixed(1) + ' °C';
  } else {
    document.getElementById('temp-val').textContent = 'n/a';
  }
  document.getElementById('temp-ts').textContent = 'just now';
  document.getElementById('stats-ts').textContent = 'updated just now';
}

function tickStatsLabel() {
  if (_lastStatsTs) {
    document.getElementById('stats-ts').textContent = 'updated ' + fmtAgo(_lastStatsTs);
    document.getElementById('temp-ts').textContent  = fmtAgo(_lastStatsTs);
  }
}

// ── History / sparklines ───────────────────────────────────────────────────────

function updateHistory(rows) {
  const cpu  = buildSparkPath(rows, 'cpu');
  const ram  = buildSparkPath(rows, 'ram');
  const disk = buildSparkPath(rows, 'disk');

  document.getElementById('cpu-sparkfill').setAttribute('d', cpu.fill);
  document.getElementById('cpu-sparkline').setAttribute('d', cpu.line);
  document.getElementById('ram-sparkfill').setAttribute('d', ram.fill);
  document.getElementById('ram-sparkline').setAttribute('d', ram.line);
  document.getElementById('disk-sparkfill').setAttribute('d', disk.fill);
  document.getElementById('disk-sparkline').setAttribute('d', disk.line);
}

// ── Scan status ────────────────────────────────────────────────────────────────

function updateScanStatus(d) {
  const pip   = document.getElementById('scan-pip');
  const label = document.getElementById('scan-label');

  pip.className = 'scan-pip';

  if (d.scanning) {
    pip.classList.add('scanning');
    label.textContent = 'scanning ports...';
  } else if (d.last_discovery) {
    pip.classList.add('ready');
    label.textContent = 'scanned ' + fmtAgo(d.last_discovery);
  } else {
    label.textContent = 'pending scan';
  }
}

// ── Services ───────────────────────────────────────────────────────────────────

const renderedPorts = new Set();

function loadThumbnail(port, imgEl, fallbackDiv) {
  imgEl.dataset.thumbTried = '1';   // prevent repeated retries on every poll
  imgEl.onload  = () => { imgEl.style.display = ''; fallbackDiv.style.display = 'none'; };
  imgEl.onerror = () => { imgEl.style.display = 'none'; fallbackDiv.style.display = 'flex'; };
  imgEl.src = '/api/thumbnail/' + port;
}

function buildCard(svc) {
  const port    = svc.port;
  const online  = !!svc.is_online;
  const href    = 'http://' + window.location.hostname + ':' + port;

  const card = document.createElement('a');
  card.className    = 'svc-card' + (online ? '' : ' offline');
  card.href         = href;
  card.target       = '_blank';
  card.rel          = 'noopener noreferrer';
  card.dataset.port = port;

  // HUD corners
  ['tl','tr','bl','br'].forEach(c => {
    const d = document.createElement('div');
    d.className = 'corner corner-' + c;
    card.appendChild(d);
  });

  // Offline badge
  const badge = document.createElement('div');
  badge.className   = 'offline-badge';
  badge.textContent = 'OFFLINE';
  if (online) badge.style.display = 'none';
  card.appendChild(badge);

  // Preview — thumbnail image with text fallback
  const preview  = document.createElement('div');
  preview.className = 'svc-preview';

  const thumb = document.createElement('img');
  thumb.className    = 'svc-thumb';
  thumb.style.display = 'none';
  thumb.alt          = '';

  const fallback = document.createElement('div');
  fallback.className = 'svc-preview-fallback';
  fallback.innerHTML = '<span class="fallback-port">:' + port + '</span><span>no preview</span>';

  const fade = document.createElement('div');
  fade.className = 'preview-fade';

  preview.appendChild(thumb);
  preview.appendChild(fallback);
  preview.appendChild(fade);
  card.appendChild(preview);

  // Only fetch if the server already has a screenshot stored
  if (svc.has_thumb) loadThumbnail(port, thumb, fallback);

  // Meta
  const meta = document.createElement('div');
  meta.className = 'svc-meta';

  const titleRow = document.createElement('div');
  titleRow.className = 'svc-title-row';
  const titleEl = document.createElement('span');
  titleEl.className   = 'svc-title';
  titleEl.textContent = svc.title || (':' + port);
  const badgeEl = document.createElement('span');
  badgeEl.className   = 'svc-port-badge';
  badgeEl.textContent = ':' + port;
  titleRow.appendChild(titleEl);
  titleRow.appendChild(badgeEl);

  const statusRow = document.createElement('div');
  statusRow.className = 'svc-status-row';

  const statusLeft = document.createElement('div');
  statusLeft.style.cssText = 'display:flex;align-items:center;gap:5px;';
  const statusEl = document.createElement('div');
  statusEl.className = online ? 'svc-online' : 'svc-offline';
  const pip = document.createElement('span');
  pip.className = 'status-pip';
  const statusLabel = document.createElement('span');
  statusLabel.textContent = online ? 'online' : 'offline';
  statusEl.appendChild(pip);
  statusEl.appendChild(statusLabel);
  statusLeft.appendChild(statusEl);

  const statusRight = document.createElement('div');
  statusRight.style.cssText = 'display:flex;align-items:center;gap:4px;';
  const sinceEl = document.createElement('span');
  sinceEl.className   = 'svc-since';
  sinceEl.textContent = online
    ? 'since ' + fmtAgo(svc.first_seen)
    : 'last seen ' + fmtAgo(svc.last_seen);
  const pctEl = document.createElement('span');
  pctEl.className = 'svc-uptime-pct';
  const pct = calcUptimePct(svc.checks);
  pctEl.textContent = pct !== null ? '· ' + pct + '%' : '';
  statusRight.appendChild(sinceEl);
  statusRight.appendChild(pctEl);

  statusRow.appendChild(statusLeft);
  statusRow.appendChild(statusRight);

  const uptimeWrapper = buildUptimeStrip(svc.checks || []);

  meta.appendChild(titleRow);
  meta.appendChild(statusRow);
  meta.appendChild(uptimeWrapper);
  card.appendChild(meta);

  return card;
}

function updateCard(card, svc) {
  const online = !!svc.is_online;

  card.classList.toggle('offline', !online);

  // Thumbnail: driven entirely by svc.has_thumb from the server.
  // - If has_thumb just became true (screenshot finished in background), load it.
  // - If has_thumb is false, clear thumbTried so we pick it up next poll.
  const thumb = card.querySelector('.svc-thumb');
  const fallback = card.querySelector('.svc-preview-fallback');
  if (thumb && fallback) {
    if (svc.has_thumb && !thumb.dataset.thumbTried) {
      loadThumbnail(svc.port, thumb, fallback);
    } else if (!svc.has_thumb) {
      delete thumb.dataset.thumbTried;
    }
  }

  // Offline badge
  const badge = card.querySelector('.offline-badge');
  if (badge) badge.style.display = online ? 'none' : '';

  // Status indicator
  const statusEl   = card.querySelector('.svc-online, .svc-offline');
  const statusLabel = statusEl ? statusEl.querySelector('span:last-child') : null;
  if (statusEl) {
    statusEl.className = online ? 'svc-online' : 'svc-offline';
    if (statusLabel) statusLabel.textContent = online ? 'online' : 'offline';
  }

  // Since + uptime %
  const sinceEl = card.querySelector('.svc-since');
  if (sinceEl) {
    sinceEl.textContent = online
      ? 'since ' + fmtAgo(svc.first_seen)
      : 'last seen ' + fmtAgo(svc.last_seen);
  }
  const pctEl = card.querySelector('.svc-uptime-pct');
  if (pctEl) {
    const pct = calcUptimePct(svc.checks);
    pctEl.textContent = pct !== null ? '· ' + pct + '%' : '';
  }

  // Rebuild uptime strip
  const meta = card.querySelector('.svc-meta');
  const oldUptime = meta && meta.lastElementChild;
  if (oldUptime && oldUptime.querySelector('.uptime-strip')) {
    oldUptime.replaceWith(buildUptimeStrip(svc.checks || []));
  }
}

function updateServices(services) {
  if (!Array.isArray(services)) return;
  const grid       = document.getElementById('services-grid');
  const currentPorts = new Set(services.map(s => s.port));

  // Remove empty state
  const empty = grid.querySelector('.svc-empty');
  if (empty && services.length > 0) empty.remove();

  // Remove gone ports
  for (const port of renderedPorts) {
    if (!currentPorts.has(port)) {
      const card = grid.querySelector('[data-port="' + port + '"]');
      if (card) card.remove();
      renderedPorts.delete(port);
    }
  }

  // Insert or update
  for (const svc of services) {
    const port = svc.port;
    if (renderedPorts.has(port)) {
      const card = grid.querySelector('[data-port="' + port + '"]');
      if (card) updateCard(card, svc);
    } else {
      const card = buildCard(svc);
      renderedPorts.add(port);

      // Insert in ascending port order
      const cards = Array.from(grid.querySelectorAll('.svc-card'));
      let inserted = false;
      for (const c of cards) {
        if (parseInt(c.dataset.port) > port) {
          grid.insertBefore(card, c);
          inserted = true;
          break;
        }
      }
      if (!inserted) grid.appendChild(card);
    }
  }

  const online = services.filter(s => s.is_online).length;
  _fvOnline = online;
  _fvTotal  = services.length;
  drawFavicon();
  document.getElementById('svc-count-label').textContent =
    online + ' online · ' + services.length + ' discovered';
}

// ── Fetch helpers ──────────────────────────────────────────────────────────────

async function fetchStats() {
  try {
    const r = await fetch('/api/stats');
    if (r.ok) updateStats(await r.json());
  } catch (e) {}
}

async function fetchHistory() {
  try {
    const r = await fetch('/api/history');
    if (r.ok) updateHistory(await r.json());
  } catch (e) {}
}

async function fetchScanStatus() {
  try {
    const r = await fetch('/api/scan-status');
    if (r.ok) updateScanStatus(await r.json());
  } catch (e) {}
}

async function fetchServices() {
  try {
    const r = await fetch('/api/services');
    if (r.ok) updateServices(await r.json());
  } catch (e) {}
}

// ── Init ───────────────────────────────────────────────────────────────────────

(function () {
  // Theme
  const mq     = window.matchMedia('(prefers-color-scheme: light)');
  const stored = localStorage.getItem('theme');
  const isLight = stored ? stored === 'light' : mq.matches;
  applyTheme(isLight, false);

  mq.addEventListener('change', e => {
    if (!localStorage.getItem('theme')) applyTheme(e.matches, false);
  });

  document.getElementById('toggle').addEventListener('click', () => {
    const next = !document.documentElement.classList.contains('light');
    localStorage.setItem('theme', next ? 'light' : 'dark');
    doTransition(next);
  });

  document.querySelector('.btn-scan').addEventListener('click', () => {
    fetch('/api/trigger-scan', { method: 'POST' });
  });

  // Draw favicon immediately so Apple devices see it before data loads
  drawFavicon();

  // Initial fetches
  fetchStats();
  fetchHistory();
  fetchScanStatus();
  fetchServices();

  // Polling
  setInterval(fetchStats,      5000);
  setInterval(fetchHistory,   30000);
  setInterval(fetchScanStatus, 4000);
  setInterval(fetchServices,  20000);

  // Tick labels every second
  setInterval(tickStatsLabel, 1000);
})();
</script>
