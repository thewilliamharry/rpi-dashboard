services:
  dashboard:
    build: ./dashboard
    container_name: pi-dashboard
    network_mode: host
    restart: unless-stopped
    volumes:
      - dashboard-data:/data
    environment:
      - EXPIRE_DAYS=7
      - TRIGGER_SCAN_RATE_LIMIT=4
      - TRIGGER_SCAN_WINDOW_SECONDS=60
      - ALERT_WEBHOOK_URL=
      - ALERT_COOLDOWN_SECONDS=300
      - ALERT_ONLY_CRITICAL=0
volumes:
  dashboard-data:
